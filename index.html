<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Your favourite music is here</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul>
            <li class="brand"><img src="Spotifylogo1.png" alt="Spotify">Spotify</li>
            <div class="navi">
                <li>Home</li>
                <li>About</li>
            </div>
        </ul>
    </nav>

    <div class="container">
         
        <div class="songlist">
            <h1> Best of Love Songs - No Copyright Sounds</h1> 
            <div>
                <div class="songItem">
                    <img src="download.jpg" alt="1">
                    <span> Zara Sa </span>
                    <span class="songlistplay"><span class="timestamp"> 05:04 <i class="fa-solid fa-play"></i> </span> </span>
                </div>
            </div>
        </div>
        <div class="songBanner"></div>
    </div>

    <div class="bottom">
        <input type="range" name="range" id="myProgressBar" min="0" max="100">
        <div class="icons">
            <!--fontawesome icons -->
            <i class="fa-solid fa-backward"></i>
            <i class="fa-solid fa-play"></i>
            <i class="fa-solid fa-forward"></i>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/b2aa8df672.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
